ai_usage_summary: |
  Used ChatGPT/Codex to inspect the supplied documents, create the project plan,
  implement the deterministic ranker, and review validation output. No candidate
  data is sent to any external API during the ranking step.

methodology_summary: |
  Deterministic hybrid ranker for the Senior AI Engineer JD. The model scores
  direct career evidence of production retrieval, search, ranking,
  recommendation, embeddings, vector infrastructure, Python, and evaluation
  systems, with career-history evidence weighted above skill tags to avoid
  AI-keyword stuffing. A separate logistics and behavior modifier incorporates
  Redrob signals such as recent activity, open-to-work status, recruiter
  response rate, response time, notice period, verification, and location or
  relocation fit. Risk penalties demote service-only careers, pure research
  profiles, irrelevant AI domains, stale candidates, inconsistent skill-duration
  claims, and other honeypot-like anomalies. Final rankings are generated by
  stable sorting on score and candidate ID, then reasonings are built from the
  highest-scoring factual evidence and the main concern for each candidate. The
  ranking step streams the 100K JSONL file, runs fully on CPU without network
  access, and produces a validated top-100 CSV with a single command.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
